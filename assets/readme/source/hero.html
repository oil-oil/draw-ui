<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<title>draw-ui README hero</title>
<style>
  :root {
    --ink: #19211f;
    --muted: #78817e;
    --paper: #f3f5f0;
    --lime: #c7f46b;
    --blue: #5b6bff;
    --coral: #ff8a6e;
    --aqua: #52c7c1;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 1200px;
    height: 1200px;
    overflow: hidden;
  }

  body {
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: transparent;
  }

  .hero {
    position: relative;
    width: 1200px;
    height: 1200px;
    overflow: hidden;
    border-radius: 32px;
    background:
      radial-gradient(circle at 1px 1px, rgba(25, 33, 31, .075) 1.2px, transparent 1.3px),
      var(--paper);
    background-size: 28px 28px;
  }

  .copy {
    position: absolute;
    z-index: 20;
    left: 72px;
    top: 58px;
  }

  .eyebrow {
    color: #44504d;
    font-size: 18px;
    font-weight: 760;
    letter-spacing: 3px;
  }

  .rule {
    width: 52px;
    height: 6px;
    margin-top: 16px;
    border-radius: 99px;
    background: var(--coral);
  }

  h1 {
    margin: 22px 0 0;
    font-size: 92px;
    line-height: .95;
    font-weight: 810;
    letter-spacing: -5px;
  }

  .tagline {
    margin-top: 24px;
    font-size: 34px;
    line-height: 1.34;
    font-weight: 650;
  }

  .tagline strong {
    padding: 0 5px 1px;
    background: linear-gradient(transparent 48%, rgba(199, 244, 107, .64) 48%);
    font-weight: inherit;
  }

  .meta {
    margin-top: 22px;
    color: var(--muted);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }

  .selection {
    position: absolute;
    z-index: 18;
    right: 78px;
    top: 70px;
    width: 218px;
    height: 160px;
    border: 2px solid var(--blue);
    background: rgba(255,255,255,.54);
  }

  .selection i {
    position: absolute;
    width: 12px;
    height: 12px;
    border: 2px solid var(--blue);
    background: var(--paper);
  }

  .selection i:nth-child(1) { left: -7px; top: -7px; }
  .selection i:nth-child(2) { right: -7px; top: -7px; }
  .selection i:nth-child(3) { left: -7px; bottom: -7px; }
  .selection i:nth-child(4) { right: -7px; bottom: -7px; }

  .selection::before {
    content: "";
    position: absolute;
    left: 34px;
    top: 36px;
    width: 92px;
    height: 12px;
    border-radius: 99px;
    background: var(--lime);
    box-shadow: 0 28px 0 rgba(82,199,193,.46), 0 56px 0 rgba(255,138,110,.46);
  }

  .cursor {
    position: absolute;
    z-index: 19;
    right: 48px;
    top: 200px;
    width: 0;
    height: 0;
    border-top: 28px solid var(--ink);
    border-right: 17px solid transparent;
    transform: rotate(-17deg);
    filter: drop-shadow(0 4px 5px rgba(25,33,31,.15));
  }

  .screen {
    position: absolute;
    overflow: hidden;
    border: 10px solid #fff;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 12px 30px rgba(25, 33, 31, .10);
  }

  .screen img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .orbit {
    z-index: 4;
    left: -58px;
    top: 432px;
    width: 760px;
    height: 438px;
    transform: rotate(-4.2deg);
  }

  .field {
    z-index: 5;
    left: 396px;
    top: 700px;
    width: 780px;
    height: 438px;
    transform: rotate(3.2deg);
  }

  .mobile {
    z-index: 8;
    right: 54px;
    top: 326px;
    width: 302px;
    height: 432px;
    transform: rotate(5deg);
    border-width: 9px;
    border-radius: 24px;
  }

  .mobile img { object-position: center top; }
</style>
<main class="hero">
  <section class="copy">
    <div class="eyebrow">OIL · UI DESIGN WORKFLOW</div>
    <div class="rule"></div>
    <h1>draw-ui</h1>
    <div class="tagline"><strong>先把页面想清楚，</strong><br>再把设计画出来。</div>
    <div class="meta">ASK · GENERATE · COMPARE · REBUILD</div>
  </section>

  <div class="selection" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
  <div class="cursor" aria-hidden="true"></div>

  <figure class="screen orbit"><img src="../screens/orbit-analytics.png" alt=""></figure>
  <figure class="screen field"><img src="../screens/field-notes.png" alt=""></figure>
  <figure class="screen mobile"><img src="../screens/nori-mobile.png" alt=""></figure>
</main>
</html>
